name: Daily Image Cleanup
on:
  # every day at 01:30am
  schedule:
    - cron: '30 1 * * *'
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@f092b48ba3b604b2a83690dc4b2bbb3392e1045f # tag=v1.2.1
        with:
          older-than: 1 month
          owner: kcp-dev
          repository: kcp
          package: kcp-prs
          delete-tags: '^pr-\d+-[a-z0-9]+-[a-z0-9]+$'
          use-regex: true
          dry-run: true
