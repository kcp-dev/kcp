apiVersion: operator.kcp.io/v1alpha1
kind: Kubeconfig
metadata:
  name: metrics-viewer
  namespace: kcp
spec:
  username: metrics-viewer
  groups:
    # we need system:masters for accessing pprof endpoint with pyroscope. system:monitoring is not enough for that
    - system:masters
  validity: 8766h
  secretRef:
    name: kubeconfig-metrics-viewer
  target:
    rootShardRef:
      name: root
