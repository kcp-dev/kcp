# ClusterRole and ClusterRoleBinding for the metrics-viewer user.
# Applied inside the kcp root workspace so Prometheus can scrape /metrics.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metrics-viewer
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metrics-viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metrics-viewer
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:monitoring
