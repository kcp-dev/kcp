apiVersion: apis.kcp.io/v1alpha1
kind: APIResourceSchema
metadata:
  name: rev0002.widgets.example.io
spec:
  group: example.io
  names:
    kind: Widget
    listKind: WidgetList
    plural: widgets
    singular: widget
  scope: Cluster
  conversion:
    strategy: None
  versions:
  - name: v1
    schema:
      description: Widgets do things
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          type: object
        spec:
          properties:
            firstName:
              type: string
            lastName:
              type: string
          type: object
        status:
          properties:
            phase:
              type: string
          type: object
      type: object
    served: true
    storage: true
    subresources:
      status: {}
  - name: v2
    schema:
      description: Widgets do things
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          type: object
        spec:
          properties:
            someNewField:
              type: object
              properties:
                hello:
                  type: string
            name:
              type: object
              properties:
                first:
                  type: string
                last:
                  type: string
                lastUpper:
                  type: string
          type: object
        status:
          properties:
            phase:
              type: string
          type: object
      type: object
    served: true
    storage: false
    subresources:
      status: {}
---
apiVersion: apis.kcp.io/v1alpha1
kind: APIConversion
metadata:
  name: rev0002.widgets.example.io
spec:
  conversions:
  - from: v1
    to: v2
    rules:
    - field: .spec.firstName
      destination: .spec.name.first
    - field: .spec.lastName
      destination: .spec.name.last
      transformation: self
    - field: .spec.lastName
      destination: .spec.name.lastUpper
      transformation: self.upperAscii()
  - from: v2
    to: v1
    rules:
    - field: .spec.name.first
      destination: .spec.firstName
    - field: .spec.name.last
      destination: .spec.lastName
    preserve:
    - .spec.someNewField
