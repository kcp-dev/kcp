apiVersion: operator.kcp.io/v1alpha1
kind: FrontProxy
metadata:
  name: frontproxy
spec:
  # no image override: the kcp-operator defaults to its version-matched
  # upstream kcp image (static install, no locally built images).
  auth:
    serviceAccount:
      enabled: true
  rootShard:
    ref:
      name: root
  external:
    hostname: kcp.localhost
    port: 8443
  deploymentTemplate:
    spec:
      template:
        spec:
          hostAliases:
            - ip: 10.96.2.2
              hostnames:
                - kcp.localhost
                - root.kcp.localhost
                - theseus.kcp.localhost
  certificateTemplates:
    server:
      spec:
        dnsNames:
        - kcp.localhost
---
apiVersion: gateway.networking.k8s.io/v1alpha3
kind: TLSRoute
metadata:
  name: front-proxy
  namespace: default
spec:
  parentRefs:
  - name: eg
    namespace: envoy-gateway-system
  hostnames:
  - kcp.localhost
  rules:
  - backendRefs:
    - name: frontproxy-front-proxy
      port: 8443
      namespace: default
